sonar.projectName=squid4win
sonar.projectDescription=Windows-first automation for building and packaging upstream Squid on native Windows.
sonar.sourceEncoding=UTF-8
sonar.python.version=3.14
sonar.scm.provider=git
# Narrow sources to stable directories so the scanner does not descend into the
# Conan/MSYS2 cache tree under the repository root while still scanning the
# committed CCI-style Squid recipe sources.
sonar.sources=config,packaging,scripts,src,conan/recipes/squid/all
sonar.exclusions=.git/**,.conan2/**,.env,.vs/**,.vsconan/**,.vscode/**,__pycache__/**,.agents/**,**/.agents/**,artifacts/**,build/**,sources/**,**/bin/**,**/obj/**,conan/**/patches/**,conan/**/test_package/**
sonar.coverage.exclusions=.github/**,conan/**,packaging/**,scripts/**,src/**
