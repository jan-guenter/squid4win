sonar.projectName=squid4win
sonar.projectDescription=Windows-first automation for building and packaging upstream Squid on native Windows.
sonar.sourceEncoding=UTF-8
sonar.python.version=3.14
sonar.scm.provider=git
sonar.sources=.
sonar.exclusions=.git/**,.conan2/**,.env,.vs/**,.vsconan/**,.vscode/**,__pycache__/**,.agents/**,**/.agents/**,artifacts/**,build/**,sources/**,**/bin/**,**/obj/**
sonar.coverage.exclusions=.github/**,conanfile.py,conan/**,packaging/**,scripts/**,src/**,test_package/**
