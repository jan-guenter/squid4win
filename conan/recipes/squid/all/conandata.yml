sources:
  "7.5":
    url: "https://github.com/squid-cache/squid/releases/download/SQUID_7_5/squid-7.5.tar.xz"
    sha256: "f6058907db0150d2f5d228482b5a9e5678920cf368ae0ccbcecceb2ff4c35106"
    strip_root: true

patches:
  "7.5":
    - patch_file: "patches/0001-mingw-cert-generator-compat.patch"
      patch_description: "Fix MinGW certificate helper and certificate DB support."
      base_path: "."
      strip: 2
    - patch_file: "patches/0002-mingw-diskthreads-compat.patch"
      patch_description: "Fix MinGW DiskThreads pipe setup, allocator visibility, and Win32 error mapping."
      base_path: "."
      strip: 2
    - patch_file: "patches/0003-mingw-winsock-link-flags.patch"
      patch_description: "Link MinGW helper binaries against Winsock where upstream omits it."
      base_path: "."
      strip: 2
    - patch_file: "patches/0004-mingw-setsockopt-signatures.patch"
      patch_description: "Fix MinGW setsockopt argument casts in QosConfig."
      base_path: "."
      strip: 2
    - patch_file: "patches/0005-mingw-devnull-compat.patch"
      patch_description: "Define _PATH_DEVNULL for MinGW log helper builds."
      base_path: "."
      strip: 2
    - patch_file: "patches/0006-mingw-kill-compat.patch"
      patch_description: "Provide a MinGW kill() shim for Windows-style process probes."
      base_path: "."
      strip: 2
    - patch_file: "patches/0007-mingw-syslog-waitstatus-compat.patch"
      patch_description: "Provide MinGW syslog and wait-status compatibility shims."
      base_path: "."
      strip: 2
    - patch_file: "patches/0008-mingw-signal-constants.patch"
      patch_description: "Provide missing Windows signal constants for MinGW builds."
      base_path: "."
      strip: 2
    - patch_file: "patches/0009-mingw-ipc-winsock-signatures.patch"
      patch_description: "Fix MinGW Winsock buffer and addrlen signatures in ipc_win32."
      base_path: "."
      strip: 2
    - patch_file: "patches/0010-mingw-unlinkd-devnull-compat.patch"
      patch_description: "Provide _PATH_DEVNULL for the MinGW unlink daemon."
      base_path: "."
      strip: 2
    - patch_file: "patches/0011-mingw-win32-service-runtime-compat.patch"
      patch_description: "Expose Windows service and win32 runtime support to MinGW builds."
      base_path: "."
      strip: 2
    - patch_file: "patches/0012-mingw-cbdata-cookie-width.patch"
      patch_description: "Use pointer-width cbdata cookies on MinGW builds."
      base_path: "."
      strip: 2
    - patch_file: "patches/0013-mingw-user-group-compat.patch"
      patch_description: "Provide passwd, group, and uid/gid compatibility shims for MinGW."
      base_path: "."
      strip: 2
    - patch_file: "patches/0014-mingw-fd-msghdr-compat.patch"
      patch_description: "Provide MinGW sendmsg/recvmsg compatibility for fd.cc."
      base_path: "."
      strip: 2
    - patch_file: "patches/0015-mingw-main-daemon-guards.patch"
      patch_description: "Exclude MinGW from Unix-only main.cc daemon management paths."
      base_path: "."
      strip: 2
    - patch_file: "patches/0016-mingw-tools-runtime-compat.patch"
      patch_description: "Provide MinGW tools.cc runtime shims and getpagesize compatibility."
      base_path: "."
      strip: 2
    - patch_file: "patches/0017-mingw-comm-socket-fcntl-compat.patch"
      patch_description: "Provide MinGW comm.cc socket adapters and fcntl compatibility shims."
      base_path: "."
      strip: 2
    - patch_file: "patches/0018-mingw-aio-win32-backend.patch"
      patch_description: "Enable the Win32 AIO backend for MinGW DiskIO AIO builds."
      base_path: "."
      strip: 2
    - patch_file: "patches/0019-mingw-lockfileex-overlapped.patch"
      patch_description: "Pass a real OVERLAPPED structure when locking MinGW files on Windows."
      base_path: "."
      strip: 2
    - patch_file: "patches/0020-mingw-setfilepointerex-truncate.patch"
      patch_description: "Use SetFilePointerEx for MinGW file truncation on Windows."
      base_path: "."
      strip: 2
    - patch_file: "patches/0021-mingw-file-rename-win32-replace.patch"
      patch_description: "Use Win32 replace semantics for MinGW file renames on Windows."
      base_path: "."
      strip: 2
    - patch_file: "patches/0022-mingw-empty-swap-state-rebuild.patch"
      patch_description: "Handle empty swap.state rebuild logs in place and close parser-owned files before Windows swap-log replacement."
      base_path: "."
      strip: 2
    - patch_file: "patches/0023-mingw-service-commandline-after-win32-init.patch"
      patch_description: "Build the parsed command line after Win32 service startup rewrites argc/argv from the registry."
      base_path: "."
      strip: 2
    - patch_file: "patches/0024-mingw-select-fdset-iteration.patch"
      patch_description: "Use Winsock fd_set copies and FD_ISSET-based iteration in the MinGW select loop."
      base_path: "."
      strip: 2
    - patch_file: "patches/0025-mingw-socket-io-dispatch.patch"
      patch_description: "Dispatch MinGW socket descriptors through recv/send instead of generic file I/O."
      base_path: "."
      strip: 2
    - patch_file: "patches/0026-mingw-store-key-private-layout.patch"
      patch_description: "Keep private store keys at the MD5 digest size when MinGW uses a wider pid_t."
      base_path: "."
      strip: 2
    - patch_file: "patches/0027-mingw-dns-registry-discovery.patch"
      patch_description: "Enable the existing Windows registry DNS discovery path for MinGW builds."
      base_path: "."
      strip: 2
    - patch_file: "patches/0028-mingw-socket-close-wrapper.patch"
      patch_description: "Use the Winsock-aware close wrapper for MinGW C++ sources so socket descriptors do not leak or desynchronize."
      base_path: "."
      strip: 2
    - patch_file: "patches/0029-mingw-supported-socket-close-cleanup.patch"
      patch_description: "On MinGW, close socket-backed CRT descriptors with Winsock first and then release the CRT slot via the supported _close() path."
      base_path: "."
      strip: 2
    - patch_file: "patches/0030-mingw-idns-stale-socket-guard.patch"
      patch_description: "Ignore stale DNS socket read callbacks on Windows after the active DNS sockets have been closed or recreated."
      base_path: "."
      strip: 2
    - patch_file: "patches/0031-mingw-dns-socket-reopen-and-winsock-errno.patch"
      patch_description: "Map MinGW Winsock recv errors back to errno and reopen internal DNS sockets when Windows reports a broken DNS listener."
      base_path: "."
      strip: 2
