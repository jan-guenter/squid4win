sources:
  "7.5":
    url: "https://github.com/squid-cache/squid/releases/download/SQUID_7_5/squid-7.5.tar.xz"
    sha256: "f6058907db0150d2f5d228482b5a9e5678920cf368ae0ccbcecceb2ff4c35106"
    strip_root: true

build:
  profile_name: "msys2-mingw-x64"
  stage_root: "build\\install\\{configuration}"
  service_name: "Squid4Win"
  host_triplet: "x86_64-w64-mingw32"
  tool_requires:
    - "msys2/cci.latest"
    - "mingw-builds/15.1.0"
  msys2:
    env: "mingw64"
    packages:
      - "autoconf"
      - "automake"
      - "libtool"
      - "make"
      - "mingw-w64-x86_64-make"
      - "mingw-w64-x86_64-pkgconf"
      - "mingw-w64-x86_64-libgnurx"
      - "mingw-w64-x86_64-libxml2"
      - "mingw-w64-x86_64-openssl"
      - "mingw-w64-x86_64-pcre2"
      - "mingw-w64-x86_64-zlib"
  mingw_builds:
    threads: "posix"
    exception: "seh"
    runtime: "ucrt"
  runtime_dlls:
    - "libcrypto-3-x64.dll"
    - "libssl-3-x64.dll"
    - "libwinpthread-1.dll"
    - "libgnurx-0.dll"
  runtime_notice_artifacts:
    - id: "openssl"
      name: "OpenSSL"
      dependency: "msys2"
      package: "mingw-w64-x86_64-openssl"
      project_url: "https://openssl-library.org"
      license: "spdx:Apache-2.0"
      dlls:
        - "libcrypto-3-x64.dll"
        - "libssl-3-x64.dll"
      license_files:
        - "licenses\\libopenssl\\LICENSE.txt"
    - id: "winpthreads"
      name: "winpthreads"
      dependency: "mingw-builds"
      package: "mingw-w64-x86_64-libwinpthread"
      project_url: "https://www.mingw-w64.org/"
      license: "spdx:MIT AND BSD-3-Clause-Clear"
      dlls:
        - "libwinpthread-1.dll"
      license_files:
        - "licenses\\winpthreads\\COPYING"
        - "licenses\\mingw-w64\\COPYING.MinGW-w64-runtime.txt"
    - id: "libgnurx"
      name: "libgnurx"
      dependency: "mingw-builds"
      package: "mingw-w64-x86_64-libgnurx"
      project_url: "https://mingw.sourceforge.io/"
      license: "LGPL"
      dlls:
        - "libgnurx-0.dll"
      license_files:
        - "licenses\\mingw-libgnurx\\COPYING.LIB"
  configure_cache:
    ac_cv_sizeof_void_p: "8"
    ac_cv_c_int8_t: "yes"
    ac_cv_c_uint8_t: "yes"
    ac_cv_c_int16_t: "yes"
    ac_cv_c_uint16_t: "yes"
    ac_cv_c_int32_t: "yes"
    ac_cv_c_uint32_t: "yes"
    ac_cv_c_int64_t: "yes"
    ac_cv_c_uint64_t: "yes"
    ac_cv_type_pid_t: "yes"
    ac_cv_type_size_t: "yes"
    ac_cv_type_ssize_t: "yes"
    ac_cv_type_off_t: "yes"
    ac_cv_sizeof_int64_t: "8"
    ac_cv_sizeof_off_t: "4"
    ac_cv_sizeof_size_t: "8"
  configure_args:
    - "--disable-strict-error-checking"
    - "--disable-dependency-tracking"
    - "--without-netfilter-conntrack"
    - "--enable-auth-basic=DB,NCSA,POP3,RADIUS,SMB,SSPI,fake"
    - "--enable-auth-digest=file"
    - "--enable-auth-negotiate=SSPI"
    - "--enable-external-acl-helpers=LM_group,SQL_session,delayer,wbinfo_group"
    - "--with-openssl"
    - "--enable-win32-service"
    - "--enable-default-hostsfile"

patches:
  "7.5":
    - patch_file: "conan/patches/squid/0001-mingw-compat-core-shims.patch"
      patch_description: "Provide foundational MinGW POSIX compatibility shims."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0002-mingw-build-system-flags.patch"
      patch_description: "Adjust Squid build-system flags and MinGW link libraries."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0003-mingw-disk-io-compat.patch"
      patch_description: "Teach Squid DiskIO backends to build and run under MinGW."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0004-mingw-socket-and-ipc-compat.patch"
      patch_description: "Add MinGW-safe Winsock and IPC wrappers."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0005-mingw-win32-runtime-support.patch"
      patch_description: "Expose the Win32 runtime helpers needed by the MinGW port."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0006-mingw-cert-generator-compat.patch"
      patch_description: "Fix MinGW certificate helper and certificate DB support."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0007-mingw-main-and-service-integration.patch"
      patch_description: "Wire MinGW into Squid runtime startup and Windows service paths."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0008-mingw-lockfileex-overlapped.patch"
      patch_description: "Pass a valid OVERLAPPED structure to LockFileEx for Windows instance locking."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0009-mingw-setfilepointerex-truncate.patch"
      patch_description: "Use SetFilePointerEx when truncating Windows-managed pid files."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0010-mingw-unlinkd-windows-ipc.patch"
      patch_description: "Treat MinGW like Windows when choosing unlinkd IPC transports."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0011-mingw-ipc-params-address-lifetime.patch"
      patch_description: "Store Windows IPC peer addresses with stable Ip::Address lifetime semantics."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0012-mingw-filerename-overwrite.patch"
      patch_description: "Use the Windows overwrite-before-rename workaround for MinGW builds too."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0013-mingw-helper-windows-guards.patch"
      patch_description: "Treat MinGW helper socket shutdown and process waits like Windows."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0014-mingw-windows-dns-registry.patch"
      patch_description: "Treat MinGW like Windows for DNS registry discovery and messaging."
      base_path: "."
      strip: 2
