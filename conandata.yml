sources:
  "7.5":
    url: "https://github.com/squid-cache/squid/releases/download/SQUID_7_5/squid-7.5.tar.xz"
    sha256: "f6058907db0150d2f5d228482b5a9e5678920cf368ae0ccbcecceb2ff4c35106"
    strip_root: true

build:
  profile_name: "msys2-mingw-x64"
  host_triplet: "x86_64-w64-mingw32"
  tool_requires:
    - "msys2/cci.latest"
    - "mingw-builds/15.1.0"
  msys2:
    env: "mingw64"
    packages:
      - "autoconf"
      - "automake"
      - "libtool"
      - "make"
      - "mingw-w64-x86_64-make"
      - "mingw-w64-x86_64-pkgconf"
      - "mingw-w64-x86_64-libgnurx"
      - "mingw-w64-x86_64-libxml2"
      - "mingw-w64-x86_64-openssl"
      - "mingw-w64-x86_64-pcre2"
      - "mingw-w64-x86_64-zlib"
  mingw_builds:
    threads: "posix"
    exception: "seh"
    runtime: "ucrt"
  runtime_dlls:
    - "libcrypto-3-x64.dll"
    - "libssl-3-x64.dll"
    - "libwinpthread-1.dll"
    - "libgnurx-0.dll"
  runtime_notice_artifacts:
    - id: "openssl"
      name: "OpenSSL"
      dependency: "msys2"
      package: "mingw-w64-x86_64-openssl"
      project_url: "https://openssl-library.org"
      license: "spdx:Apache-2.0"
      dlls:
        - "libcrypto-3-x64.dll"
        - "libssl-3-x64.dll"
      license_files:
        - "licenses\\libopenssl\\LICENSE.txt"
    - id: "winpthreads"
      name: "winpthreads"
      dependency: "mingw-builds"
      package: "mingw-w64-x86_64-libwinpthread"
      project_url: "https://www.mingw-w64.org/"
      license: "spdx:MIT AND BSD-3-Clause-Clear"
      dlls:
        - "libwinpthread-1.dll"
      license_files:
        - "licenses\\winpthreads\\COPYING"
        - "licenses\\mingw-w64\\COPYING.MinGW-w64-runtime.txt"
    - id: "libgnurx"
      name: "libgnurx"
      dependency: "mingw-builds"
      package: "mingw-w64-x86_64-libgnurx"
      project_url: "https://mingw.sourceforge.io/"
      license: "LGPL"
      dlls:
        - "libgnurx-0.dll"
      license_files:
        - "licenses\\mingw-libgnurx\\COPYING.LIB"
  configure_cache:
    ac_cv_sizeof_void_p: "8"
    ac_cv_c_int8_t: "yes"
    ac_cv_c_uint8_t: "yes"
    ac_cv_c_int16_t: "yes"
    ac_cv_c_uint16_t: "yes"
    ac_cv_c_int32_t: "yes"
    ac_cv_c_uint32_t: "yes"
    ac_cv_c_int64_t: "yes"
    ac_cv_c_uint64_t: "yes"
    ac_cv_type_pid_t: "yes"
    ac_cv_type_size_t: "yes"
    ac_cv_type_ssize_t: "yes"
    ac_cv_type_off_t: "yes"
    ac_cv_sizeof_int64_t: "8"
    ac_cv_sizeof_off_t: "4"
    ac_cv_sizeof_size_t: "8"
  configure_args:
    - "--without-netfilter-conntrack"

patches:
  "7.5":
    - patch_file: "conan/patches/squid/0001-mingw-cert-generator-compat.patch"
      patch_description: "Fix MinGW certificate helper and certificate DB support."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0002-mingw-diskthreads-compat.patch"
      patch_description: "Fix MinGW DiskThreads pipe setup, allocator visibility, and Win32 error mapping."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0003-mingw-winsock-link-flags.patch"
      patch_description: "Link MinGW helper binaries against Winsock where upstream omits it."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0004-mingw-setsockopt-signatures.patch"
      patch_description: "Fix MinGW setsockopt argument casts in QosConfig."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0005-mingw-devnull-compat.patch"
      patch_description: "Define _PATH_DEVNULL for MinGW log helper builds."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0006-mingw-kill-compat.patch"
      patch_description: "Provide a MinGW kill() shim for Windows-style process probes."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0007-mingw-syslog-waitstatus-compat.patch"
      patch_description: "Provide MinGW syslog and wait-status compatibility shims."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0008-mingw-signal-constants.patch"
      patch_description: "Provide missing Windows signal constants for MinGW builds."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0009-mingw-ipc-winsock-signatures.patch"
      patch_description: "Fix MinGW Winsock buffer and addrlen signatures in ipc_win32."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0010-mingw-unlinkd-devnull-compat.patch"
      patch_description: "Provide _PATH_DEVNULL for the MinGW unlink daemon."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0011-mingw-win32-service-runtime-compat.patch"
      patch_description: "Expose Windows service and win32 runtime support to MinGW builds."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0012-mingw-cbdata-cookie-width.patch"
      patch_description: "Use pointer-width cbdata cookies on MinGW builds."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0013-mingw-user-group-compat.patch"
      patch_description: "Provide passwd, group, and uid/gid compatibility shims for MinGW."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0014-mingw-fd-msghdr-compat.patch"
      patch_description: "Provide MinGW sendmsg/recvmsg compatibility for fd.cc."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0015-mingw-main-daemon-guards.patch"
      patch_description: "Exclude MinGW from Unix-only main.cc daemon management paths."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0016-mingw-tools-runtime-compat.patch"
      patch_description: "Provide MinGW tools.cc runtime shims and getpagesize compatibility."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0017-mingw-comm-socket-fcntl-compat.patch"
      patch_description: "Provide MinGW comm.cc socket adapters and fcntl compatibility shims."
      base_path: "."
      strip: 2
    - patch_file: "conan/patches/squid/0018-mingw-aio-win32-backend.patch"
      patch_description: "Enable the Win32 AIO backend for MinGW DiskIO AIO builds."
      base_path: "."
      strip: 2
