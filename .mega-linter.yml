CLEAR_REPORT_FOLDER: true
EXCLUDED_DIRECTORIES:
  - .conan2
  - .venv
  - __pycache__
  - artifacts
  - bin
  - build
  - obj
  - sources
FLAVOR_SUGGESTIONS: false
FORMATTERS_DISABLE_ERRORS: false
LOG_LEVEL: INFO
PARALLEL: true
PRINT_ALPACA: false
REPORT_OUTPUT_FOLDER: megalinter-reports
SECURED_ENV_VARIABLES:
  - SONAR_TOKEN
  - SONAR_SCAN_TOKEN
  - SONARQUBE_TOKEN
  - SQUID4WIN_SIGNING_CERTIFICATE_PFX_BASE64
  - SQUID4WIN_SIGNING_CERTIFICATE_PASSWORD
SHOW_ELAPSED_TIME: true

ENABLE_LINTERS:
  - ACTION_ACTIONLINT
  - CSHARP_DOTNET_FORMAT
  - JSON_JSONLINT
  - JSON_V8R
  - MARKDOWN_MARKDOWNLINT
  - POWERSHELL_POWERSHELL
  - PYTHON_RUFF
  - YAML_V8R
  - YAML_YAMLLINT

CSHARP_DOTNET_FORMAT_ARGUMENTS:
  - src/tray/Squid4Win.Tray/Squid4Win.Tray.csproj
  - whitespace
  - --verbosity
  - minimal
CSHARP_DOTNET_FORMAT_DISABLE_ERRORS: false

MARKDOWN_MARKDOWNLINT_CONFIG_FILE: .markdownlint.json
MARKDOWN_MARKDOWNLINT_DISABLE_ERRORS: false
MARKDOWN_MARKDOWNLINT_FILTER_REGEX_EXCLUDE: (^\.agents/skills/|^\.venv/|^\.conan2/|^artifacts/|^build/|^sources/|^LICENSE$)

POWERSHELL_POWERSHELL_CONFIG_FILE: PSScriptAnalyzerSettings.psd1
POWERSHELL_POWERSHELL_FILTER_REGEX_INCLUDE: (^scripts/)
POWERSHELL_POWERSHELL_RULES_PATH: scripts

PYTHON_RUFF_CONFIG_FILE: LINTER_DEFAULT
PYTHON_RUFF_FILTER_REGEX_INCLUDE: (^src/)
