version: 2
updates:
  # Dependabot can track the Python automation environment in pyproject.toml
  # and uv.lock, but it cannot manage Conan package graphs directly.
  # update-upstream.yml handles Squid release metadata instead.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: UTC
    commit-message:
      prefix: chore
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 10

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: UTC
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - python
    open-pull-requests-limit: 5
