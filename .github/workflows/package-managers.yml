name: Package manager manifests

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to package
        required: false
        default: ""
      version:
        description: Package version override
        required: false
        default: ""
      repository:
        description: GitHub repository to read release assets from
        required: false
        default: ""
  workflow_call:
    inputs:
      tag:
        description: Release tag to package
        required: false
        type: string
        default: ""
      version:
        description: Package version override
        required: false
        type: string
        default: ""
      repository:
        description: GitHub repository to read release assets from
        required: false
        type: string
        default: ""
    outputs:
      repository:
        description: Repository used to resolve release assets
        value: ${{ jobs.generate.outputs.repository }}
      tag:
        description: Release tag used for package metadata
        value: ${{ jobs.generate.outputs.tag }}
      version:
        description: Package version used for generated metadata
        value: ${{ jobs.generate.outputs.version }}
      output_root:
        description: Output directory for generated package manager metadata
        value: ${{ jobs.generate.outputs.output_root }}
      msi_sha256:
        description: MSI SHA256 used in generated metadata
        value: ${{ jobs.generate.outputs.msi_sha256 }}
      portable_zip_sha256:
        description: Portable zip SHA256 used in generated metadata
        value: ${{ jobs.generate.outputs.portable_zip_sha256 }}

permissions:
  contents: read

jobs:
  generate:
    name: Generate feed metadata
    if: ${{ github.event_name != 'release' || github.event.release.prerelease != true }}
    runs-on: windows-2022
    outputs:
      repository: ${{ steps.release.outputs.repository }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      output_root: ${{ steps.manifests.outputs.output_root }}
      msi_sha256: ${{ steps.manifests.outputs.msi_sha256 }}
      portable_zip_sha256: ${{ steps.manifests.outputs.portable_zip_sha256 }}
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Cache Python virtual environment
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: .venv
          key: ${{ runner.os }}-${{ runner.arch }}-py314-venv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-py314-venv-

      - name: Sync automation environment
        run: uv sync --locked

      - name: Resolve release metadata
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_REPOSITORY: ${{ inputs.repository }}
          DEFAULT_REPOSITORY: ${{ github.repository }}
        run: |
          $repository = if ($env:INPUT_REPOSITORY) {
            $env:INPUT_REPOSITORY
          } else {
            $env:DEFAULT_REPOSITORY
          }

          $versionFromConfig = (Get-Content -Raw -LiteralPath .\config\squid-version.json | ConvertFrom-Json).version
          $tag = if (($env:EVENT_NAME -eq 'release') -and $env:RELEASE_TAG) {
            $env:RELEASE_TAG
          } elseif ($env:INPUT_TAG) {
            $env:INPUT_TAG
          } else {
            "v$versionFromConfig"
          }

          $version = if ($env:INPUT_VERSION) {
            $env:INPUT_VERSION
          } elseif ($tag -match '^v(?<version>.+)$') {
            $Matches.version
          } elseif ($tag -match '^SQUID_(?<major>\d+)_(?<minor>\d+)(?:_(?<patch>\d+))?$') {
            @(
              $Matches.major,
              $Matches.minor,
              $(if ($Matches.patch) { $Matches.patch } else { $null })
            ) | Where-Object { $_ } | Join-String -Separator '.'
          } else {
            $versionFromConfig
          }

          $msiUrl = "https://github.com/$repository/releases/download/$tag/squid4win.msi"
          $portableZipUrl = "https://github.com/$repository/releases/download/$tag/squid4win-portable.zip"

          "repository=$repository" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "msi_url=$msiUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "portable_zip_url=$portableZipUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $downloadRoot = Join-Path $PWD.Path 'artifacts\downloads'
          $null = New-Item -ItemType Directory -Path $downloadRoot -Force

          gh release download '${{ steps.release.outputs.tag }}' `
            --repo '${{ steps.release.outputs.repository }}' `
            --pattern 'squid4win.msi' `
            --pattern 'squid4win-portable.zip' `
            --dir $downloadRoot

      - name: Generate package manager metadata
        id: manifests
        run: |
          $downloadRoot = Join-Path $PWD.Path 'artifacts\downloads'
          uv run squid4win-automation package-manager-export `
            --repository-root $PWD.Path `
            --version '${{ steps.release.outputs.version }}' `
            --tag '${{ steps.release.outputs.tag }}' `
            --repository '${{ steps.release.outputs.repository }}' `
            --msi-path (Join-Path $downloadRoot 'squid4win.msi') `
            --portable-zip-path (Join-Path $downloadRoot 'squid4win-portable.zip') `
            --output-root (Join-Path $PWD.Path 'artifacts\package-managers') `
            --execute

      - name: Upload package manager artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: squid4win-package-managers
          path: artifacts\package-managers\**
          if-no-files-found: error

      - name: Summarize publication prerequisites
        run: |
          if (-not $env:GITHUB_STEP_SUMMARY) {
            exit 0
          }

          $summaryLines = @(
            '## Package manager metadata',
            '',
            ('- Repository: `{0}`' -f '${{ steps.release.outputs.repository }}'),
            ('- Tag: `{0}`' -f '${{ steps.release.outputs.tag }}'),
            ('- Version: `{0}`' -f '${{ steps.release.outputs.version }}'),
            ('- MSI SHA256: `{0}`' -f '${{ steps.manifests.outputs.msi_sha256 }}'),
            ('- Portable zip SHA256: `{0}`' -f '${{ steps.manifests.outputs.portable_zip_sha256 }}'),
            '',
            'Live publication is handled separately through `package-manager-publish.yml`.',
            '- `WINGET_GITHUB_TOKEN` plus optional `WINGET_TARGET_REPOSITORY` and `WINGET_TARGET_BRANCH`',
            '- `CHOCO_API_KEY` plus optional `CHOCO_PUSH_SOURCE_URL` and `CHOCO_QUERY_SOURCE_URL`',
            '- `SCOOP_GITHUB_TOKEN`, `SCOOP_BUCKET_REPOSITORY`, and optional `SCOOP_BUCKET_BRANCH`'
          )

          $summaryLines -join [Environment]::NewLine | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
