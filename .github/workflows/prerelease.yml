name: Prerelease

on:
  push:
    tags:
      - v*-*
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: prerelease-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prerelease:
    uses: ./.github/workflows/build-release-artifacts.yml
    with:
      artifact_name: squid4win-prerelease
      release_channel: prerelease
      prerelease: true
      publish_github_release: ${{ github.event_name == 'push' }}
    secrets:
      SQUID4WIN_SIGNING_CERTIFICATE_PFX_BASE64: ${{ secrets.SQUID4WIN_SIGNING_CERTIFICATE_PFX_BASE64 }}
      SQUID4WIN_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SQUID4WIN_SIGNING_CERTIFICATE_PASSWORD }}
