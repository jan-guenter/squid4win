name: Build release artifacts

on:
  workflow_call:
    inputs:
      artifact_name:
        description: Uploaded artifact name
        required: true
        type: string
      release_channel:
        description: Release channel label for summaries
        required: true
        type: string
      prerelease:
        description: Publish the GitHub release as a prerelease
        required: false
        type: boolean
        default: false
      publish_github_release:
        description: Publish a GitHub release from the current ref
        required: false
        type: boolean
        default: false
    secrets:
      SQUID4WIN_SIGNING_CERTIFICATE_PFX_BASE64:
        required: false
      SQUID4WIN_SIGNING_CERTIFICATE_PASSWORD:
        required: false

env:
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build ${{ inputs.release_channel }} artifacts
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      CONAN_HOME: ${{ github.workspace }}\.conan2
    outputs:
      has_wix_sources: ${{ steps.packaging.outputs.has_wix_sources }}
      signing_configured: ${{ steps.release-security.outputs.signing_configured }}
      payload_signing_enabled: ${{ steps.package.outputs.payload_signing_enabled }}
      msi_signing_enabled: ${{ steps.package.outputs.msi_signing_enabled }}
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Cache Python virtual environment
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: .venv
          key: ${{ runner.os }}-${{ runner.arch }}-py314-venv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-py314-venv-

      - name: Sync automation environment
        run: uv sync --locked

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: 10.0.x

      - name: Resolve release security configuration
        id: release-security
        env:
          SIGNING_CERTIFICATE_PATH: ${{ vars.SQUID4WIN_SIGNING_CERTIFICATE_PATH }}
          SIGNING_CERTIFICATE_PFX_BASE64: ${{ secrets.SQUID4WIN_SIGNING_CERTIFICATE_PFX_BASE64 }}
          SIGNING_TIMESTAMP_URL: ${{ vars.SQUID4WIN_SIGNING_TIMESTAMP_URL }}
          SIGNTOOL_PATH: ${{ vars.SQUID4WIN_SIGNTOOL_PATH }}
          DISABLE_GITHUB_ATTESTATION: ${{ vars.SQUID4WIN_DISABLE_GITHUB_ATTESTATION }}
        run: |
          $signingConfigured = `
            (-not [string]::IsNullOrWhiteSpace($env:SIGNING_CERTIFICATE_PATH)) -or `
            (-not [string]::IsNullOrWhiteSpace($env:SIGNING_CERTIFICATE_PFX_BASE64))
          $timestampConfigured = -not [string]::IsNullOrWhiteSpace($env:SIGNING_TIMESTAMP_URL)
          $customSignToolConfigured = -not [string]::IsNullOrWhiteSpace($env:SIGNTOOL_PATH)
          $attestationEnabled = ($env:GITHUB_SERVER_URL -eq 'https://github.com') -and ($env:DISABLE_GITHUB_ATTESTATION -ne 'true')

          "signing_configured=$($signingConfigured.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "timestamp_configured=$($timestampConfigured.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "custom_signtool_configured=$($customSignToolConfigured.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "attestation_enabled=$($attestationEnabled.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Cache Conan home
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ runner.os }}-conan-${{ hashFiles('conan/**', 'pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Validate committed root Conan lockfile
        if: ${{ inputs.publish_github_release }}
        run: |
          $repoLockfilePath = Join-Path $PWD.Path 'conan\lockfiles\msys2-mingw-x64-release.lock'
          if (-not (Test-Path -LiteralPath $repoLockfilePath -PathType Leaf)) {
            throw "Tag-triggered GitHub release publication requires the committed Conan lockfile at '$repoLockfilePath'."
          }

      - name: Build native Squid bundle
        run: |
          $arguments = @(
            'run',
            'squid4win-automation',
            'squid-build',
            '--repository-root',
            $PWD.Path,
            '--configuration',
            'Release',
             '--lockfile-path',
             'conan\lockfiles\msys2-mingw-x64-release.lock',
             '--with-tray',
             '--with-runtime-dlls',
             '--with-packaging-support'
           )
          if ('${{ inputs.publish_github_release }}' -ne 'true') {
            $arguments += '--refresh-lockfile'
          }
          & uv @arguments

      - name: Smoke test Squid
        run: uv run squid4win-automation smoke-test --configuration Release --require-notices

      - name: Detect MSI packaging inputs
        id: packaging
        env:
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
          PUBLISH_GITHUB_RELEASE: ${{ inputs.publish_github_release }}
          RELEASE_IS_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          $wixProjectPath = Join-Path $PWD.Path 'packaging\wix\Squid4Win.Installer.wixproj'
          $hasWixSources = Test-Path -LiteralPath $wixProjectPath
          "has_wix_sources=$($hasWixSources.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          if ($env:GITHUB_STEP_SUMMARY) {
            $summaryLines = @(
              '## Packaging',
              '',
              ('- Channel: `{0}`' -f $env:RELEASE_CHANNEL),
              ('- GitHub release publication: `{0}`' -f $env:PUBLISH_GITHUB_RELEASE),
              ('- Prerelease channel: `{0}`' -f $env:RELEASE_IS_PRERELEASE),
              ('- WiX source present: `{0}`' -f $hasWixSources),
              ('- Installer project: `{0}`' -f $wixProjectPath)
            )

            if (-not $hasWixSources) {
              $summaryLines += '- MSI packaging remains disabled because packaging\wix\Squid4Win.Installer.wixproj is not present yet.'
            }

            $summaryLines -join [Environment]::NewLine | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }

      - name: Package release artifacts
        id: package
        env:
          SQUID4WIN_SIGNING_CERTIFICATE_PATH: ${{ vars.SQUID4WIN_SIGNING_CERTIFICATE_PATH }}
          SQUID4WIN_SIGNING_CERTIFICATE_PFX_BASE64: ${{ secrets.SQUID4WIN_SIGNING_CERTIFICATE_PFX_BASE64 }}
          SQUID4WIN_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SQUID4WIN_SIGNING_CERTIFICATE_PASSWORD }}
          SQUID4WIN_SIGNING_TIMESTAMP_URL: ${{ vars.SQUID4WIN_SIGNING_TIMESTAMP_URL }}
          SQUID4WIN_SIGNTOOL_PATH: ${{ vars.SQUID4WIN_SIGNTOOL_PATH }}
        run: |
          $arguments = @(
            'run',
            'squid4win-automation',
            'bundle-package',
            '--repository-root',
            $PWD.Path,
            '--configuration',
            'Release',
             '--require-tray',
             '--require-notices',
             '--create-portable-zip',
             '--sign-payload-files'
           )
          $hasWixSources = '${{ steps.packaging.outputs.has_wix_sources }}' -eq 'true'
          if ($hasWixSources) {
            $arguments += '--sign-msi'
          } else {
            $arguments += '--skip-installer'
          }
          & uv @arguments

          $artifactRoot = Join-Path $PWD.Path 'artifacts'
          $installerPayloadRoot = Join-Path $artifactRoot 'install-root'
          $portableZipPath = Join-Path $artifactRoot 'squid4win-portable.zip'
          $noticesPath = Join-Path $installerPayloadRoot 'THIRD-PARTY-NOTICES.txt'
          $msiPath = Join-Path $artifactRoot 'squid4win.msi'
          $signingConfigured = '${{ steps.release-security.outputs.signing_configured }}' -eq 'true'
          $payloadSigningEnabled = $signingConfigured
          $msiSigningEnabled = $signingConfigured -and $hasWixSources

          if (-not (Test-Path -LiteralPath $installerPayloadRoot -PathType Container)) {
            throw "Expected the installer payload root at '$installerPayloadRoot'."
          }
          if (-not (Test-Path -LiteralPath $portableZipPath -PathType Leaf)) {
            throw "Expected the portable zip at '$portableZipPath'."
          }
          if (-not (Test-Path -LiteralPath $noticesPath -PathType Leaf)) {
            throw "Expected the staged notices file at '$noticesPath'."
          }
          if ($hasWixSources -and -not (Test-Path -LiteralPath $msiPath -PathType Leaf)) {
            throw "Expected the MSI at '$msiPath'."
          }

          "installer_payload_root=$installerPayloadRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "portable_zip_path=$portableZipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "notices_path=$noticesPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          if ($hasWixSources) {
            "msi_path=$msiPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            "msi_path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
          "payload_signing_enabled=$($payloadSigningEnabled.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "msi_signing_enabled=$($msiSigningEnabled.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Generate release integrity manifest
        id: integrity
        run: |
          $artifactFiles = [System.Collections.Generic.List[string]]::new()
          foreach ($candidatePath in @(
            '${{ steps.package.outputs.portable_zip_path }}',
            '${{ steps.package.outputs.msi_path }}'
          )) {
            if (-not [string]::IsNullOrWhiteSpace($candidatePath) -and (Test-Path -LiteralPath $candidatePath -PathType Leaf)) {
              $artifactFiles.Add([System.IO.Path]::GetFullPath($candidatePath))
            }
          }

          $artifactFiles = @($artifactFiles | Sort-Object -Unique)
          if ($artifactFiles.Count -eq 0) {
            throw 'No release artifacts were available to hash.'
          }

          $checksumPath = Join-Path $PWD.Path 'artifacts\squid4win-artifacts.sha256'
          $checksumLines = foreach ($artifactFile in $artifactFiles) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $artifactFile).Hash.ToLowerInvariant()
            '{0} *{1}' -f $hash, (Split-Path -Leaf $artifactFile)
          }

          Set-Content -LiteralPath $checksumPath -Value (($checksumLines -join [Environment]::NewLine) + [Environment]::NewLine) -Encoding ascii

          "checksums_path=$checksumPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "artifact_count=$($artifactFiles.Count)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "subject_paths<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $artifactFiles | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Attest release artifacts
        if: ${{ steps.release-security.outputs.attestation_enabled == 'true' }}
        id: attest
        continue-on-error: true
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.integrity.outputs.subject_paths }}

      - name: Collect attestation bundle
        if: ${{ steps.attest.outcome == 'success' && steps.attest.outputs.bundle-path != '' }}
        id: attestation-bundle
        run: |
          $bundleArtifactPath = Join-Path $PWD.Path 'artifacts\squid4win-artifacts-attestation.sigstore.json'
          Copy-Item -LiteralPath '${{ steps.attest.outputs.bundle-path }}' -Destination $bundleArtifactPath -Force
          "bundle_path=$bundleArtifactPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Summarize release integrity scaffolding
        if: always()
        run: |
          if (-not $env:GITHUB_STEP_SUMMARY) {
            exit 0
          }

          $payloadSigningStatus = if ('${{ steps.package.outputs.payload_signing_enabled }}' -eq 'true') {
            'enabled'
          } else {
            'inactive (no signing material configured)'
          }

          $msiSigningStatus = if ('${{ steps.package.outputs.msi_signing_enabled }}' -eq 'true') {
            'enabled'
          } elseif ('${{ steps.packaging.outputs.has_wix_sources }}' -ne 'true') {
            'skipped (MSI packaging disabled)'
          } else {
            'inactive (no signing material configured)'
          }

          $attestationStatus = if ('${{ steps.release-security.outputs.attestation_enabled }}' -ne 'true') {
            'skipped'
          } elseif ('${{ steps.attest.outcome }}') {
            '${{ steps.attest.outcome }}'
          } else {
            'not-run'
          }

          $summaryLines = @(
            '## Release integrity scaffolding',
            '',
            ('- Signing certificate configured: `{0}`' -f ('${{ steps.release-security.outputs.signing_configured }}' -eq 'true')),
            ('- Timestamp URL configured: `{0}`' -f ('${{ steps.release-security.outputs.timestamp_configured }}' -eq 'true')),
            ('- Payload signing: {0}' -f $payloadSigningStatus),
            ('- MSI signing: {0}' -f $msiSigningStatus),
            ('- Artifact checksum manifest: `{0}`' -f '${{ steps.integrity.outputs.checksums_path }}'),
            ('- GitHub attestation status: `{0}`' -f $attestationStatus)
          )

          if ('${{ steps.attest.outputs.attestation-url }}') {
            $summaryLines += ('- GitHub attestation URL: {0}' -f '${{ steps.attest.outputs.attestation-url }}')
          }

          if ('${{ steps.attestation-bundle.outputs.bundle_path }}') {
            $summaryLines += ('- Attestation bundle artifact: `{0}`' -f '${{ steps.attestation-bundle.outputs.bundle_path }}')
          }

          $summaryLines -join [Environment]::NewLine | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Upload build binaries and symbols
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.artifact_name }}-build-output
          path: |
            build\tray\release\**
            build\install\release\**
            build\conan\msys2-mingw-x64-release\build\**\config.log
          if-no-files-found: warn

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.artifact_name }}
          path: artifacts/**
          if-no-files-found: error

  validate-publish-prereqs:
    name: Validate ${{ inputs.release_channel }} publication prerequisites
    needs: build
    if: ${{ inputs.publish_github_release }}
    runs-on: ubuntu-latest
    steps:
      - name: Require signed release artifacts
        shell: pwsh
        env:
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
          HAS_WIX_SOURCES: ${{ needs.build.outputs.has_wix_sources }}
          SIGNING_CONFIGURED: ${{ needs.build.outputs.signing_configured }}
          PAYLOAD_SIGNING_ENABLED: ${{ needs.build.outputs.payload_signing_enabled }}
          MSI_SIGNING_ENABLED: ${{ needs.build.outputs.msi_signing_enabled }}
        run: |
          $failures = [System.Collections.Generic.List[string]]::new()

          if ($env:SIGNING_CONFIGURED -ne 'true') {
            $failures.Add('Signing credentials are not configured.')
          }

          if ($env:PAYLOAD_SIGNING_ENABLED -ne 'true') {
            $failures.Add('Payload signing did not run, so the portable zip would be published unsigned.')
          }

          if ($env:HAS_WIX_SOURCES -eq 'true' -and $env:MSI_SIGNING_ENABLED -ne 'true') {
            $failures.Add('MSI signing did not run, so the MSI would be published unsigned.')
          }

          if ($env:GITHUB_STEP_SUMMARY) {
            $summaryLines = @(
              '## Release publication prerequisites',
              '',
              ('- Release channel: `{0}`' -f $env:RELEASE_CHANNEL),
              ('- Signing configured: `{0}`' -f ($env:SIGNING_CONFIGURED -eq 'true')),
              ('- Payload signing enabled: `{0}`' -f ($env:PAYLOAD_SIGNING_ENABLED -eq 'true')),
              ('- WiX packaging enabled: `{0}`' -f ($env:HAS_WIX_SOURCES -eq 'true')),
              ('- MSI signing enabled: `{0}`' -f ($env:MSI_SIGNING_ENABLED -eq 'true'))
            )

            if ($failures.Count -eq 0) {
              $summaryLines += '- Result: ready to publish signed GitHub release assets.'
            } else {
              $summaryLines += ('- Result: blocked. {0}' -f ($failures -join ' '))
            }

            $summaryLines -join [Environment]::NewLine | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }

          if ($failures.Count -gt 0) {
            throw "Refusing to publish the $($env:RELEASE_CHANNEL) GitHub release. $($failures -join ' ')"
          }

  publish:
    name: Publish ${{ inputs.release_channel }} release
    needs:
      - build
      - validate-publish-prereqs
    if: ${{ inputs.publish_github_release }}
    runs-on: ubuntu-latest
    environment: release-approval
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          prerelease: ${{ inputs.prerelease }}
          files: |
            artifacts/*.zip
            artifacts/*.msi
            artifacts/*.sha256
            artifacts/*.sigstore.json
          fail_on_unmatched_files: false
