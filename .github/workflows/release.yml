name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  release:
    name: Build release artifacts
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build tray app
        run: dotnet build .\Squid4Win.slnx -c Release --nologo

      - name: Resolve build automation configuration
        id: build-config
        run: |
          $buildProfile = .\scripts\Get-SquidBuildProfile.ps1
          $layout = .\scripts\Resolve-SquidBuildLayout.ps1 -Configuration Release -RepositoryRoot $PWD.Path
          $conanHome = .\scripts\Resolve-ConanHome.ps1 -RepositoryRoot $PWD.Path

          "CONAN_HOME=$conanHome" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "conan_home=$conanHome" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "repo_lockfile_path=$($layout.RepoLockfilePath)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "stage_root=$($layout.StageRoot)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "msys2_packages=$((@($buildProfile.requiredMsys2Packages | ForEach-Object { [string]$_ }) -join ' '))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Cache Conan home
        uses: actions/cache@v4
        with:
          path: ${{ steps.build-config.outputs.conan_home }}
          key: ${{ runner.os }}-conan-${{ hashFiles('conanfile.py', 'conan/**', 'requirements-automation.txt') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Install automation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .\requirements-automation.txt

      - name: Setup MSYS2
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: ${{ steps.build-config.outputs.msys2_packages }}

      - name: Validate native toolchain bootstrap
        id: bootstrap
        run: |
          $state = .\scripts\Invoke-SquidBuild.ps1 `
            -Configuration Release `
            -BootstrapOnly `
            -AllowMissingPrerequisites `
            -Msys2Root '${{ steps.msys2.outputs.msys2-location }}'

          "effective_profile_path=$($state.EffectiveProfilePath)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "msys2_root=$($state.Msys2Root)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          $conanVersion = if ($state.ConanVersion) { $state.ConanVersion } else { 'missing' }
          $msys2Root = if ($state.Msys2Root) { $state.Msys2Root } else { 'missing' }
          $profilePath = if ($state.EffectiveProfilePath) {
            $state.EffectiveProfilePath
          } elseif ($state.PlannedEffectiveProfilePath) {
            $state.PlannedEffectiveProfilePath
          } else {
            'missing'
          }
          $summaryLines = @(
            '## Native bootstrap',
            '',
            ('- Ready: `{0}`' -f $state.Ready),
            ('- Metadata synchronized: `{0}`' -f $state.MetadataSynchronized),
            ('- Conan home: `{0}`' -f $state.ConanHome),
            ('- Conan version: `{0}`' -f $conanVersion),
            ('- MSYS2 root: `{0}`' -f $msys2Root),
            ('- Conan profile: `{0}`' -f $profilePath)
          )

          if ($state.MissingMsys2Packages.Count -gt 0) {
            $summaryLines += ('- Missing MSYS2 packages: `{0}`' -f ($state.MissingMsys2Packages -join ', '))
          }

          if ($state.Warnings.Count -gt 0) {
            $summaryLines += ''
            $summaryLines += '### Warnings'
            $summaryLines += $state.Warnings | ForEach-Object { '- ' + $_ }
          }

          if ($state.Errors.Count -gt 0) {
            $summaryLines += ''
            $summaryLines += '### Errors'
            $summaryLines += $state.Errors | ForEach-Object { '- ' + $_ }
          }

          if ($env:GITHUB_STEP_SUMMARY) {
            $summaryLines -join [Environment]::NewLine | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }

          if (-not $state.Ready) {
            throw ($state.Errors -join [Environment]::NewLine)
          }

      - name: Build Squid
        run: |
          .\scripts\Invoke-SquidBuild.ps1 `
            -Configuration Release `
            -Clean `
            -Msys2Root '${{ steps.bootstrap.outputs.msys2_root }}' `
            -EffectiveProfilePath '${{ steps.bootstrap.outputs.effective_profile_path }}' `
            -LockfilePath '${{ steps.build-config.outputs.repo_lockfile_path }}'

      - name: Smoke test Squid
        run: .\scripts\Invoke-SmokeTests.ps1 -Configuration Release

      - name: Publish tray app
        id: tray
        run: |
          $trayPublishRoot = .\scripts\Publish-TrayApp.ps1 -Configuration Release
          "tray_publish_root=$trayPublishRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Detect MSI packaging inputs
        id: packaging
        run: |
          $wixProjectPath = Join-Path $PWD.Path 'packaging\wix\Squid4Win.Installer.wixproj'
          $hasWixSources = Test-Path -LiteralPath $wixProjectPath
          "has_wix_sources=$($hasWixSources.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

          if ($env:GITHUB_STEP_SUMMARY) {
            $summaryLines = @(
              '## Packaging',
              '',
              ('- WiX source present: `{0}`' -f $hasWixSources),
              ('- Installer project: `{0}`' -f $wixProjectPath)
            )

            if (-not $hasWixSources) {
              $summaryLines += '- MSI packaging remains disabled because packaging\wix\Squid4Win.Installer.wixproj is not present yet.'
            }

            $summaryLines -join [Environment]::NewLine | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }

      - name: Stage release payload
        id: payload
        run: |
          $payload = .\scripts\Stage-ReleasePayload.ps1 `
            -Configuration Release `
            -TrayPublishRoot '${{ steps.tray.outputs.tray_publish_root }}' `
            -CreatePortableZip

          "installer_payload_root=$($payload.InstallPayloadRoot)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "portable_zip_path=$($payload.PortableZipPath)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "notices_path=$($payload.NoticesPath)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build MSI
        if: ${{ steps.packaging.outputs.has_wix_sources == 'true' }}
        id: wix
        run: |
          $build = .\scripts\Build-Installer.ps1 `
            -Configuration Release `
            -InstallerPayloadRoot '${{ steps.payload.outputs.installer_payload_root }}'

          "msi_path=$($build.MsiPath)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "product_version=$($build.ProductVersion)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: squid4win-release
          path: artifacts/**
          if-no-files-found: error

      - name: Publish GitHub release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/*.msi
          fail_on_unmatched_files: false
