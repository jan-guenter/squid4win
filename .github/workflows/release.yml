name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    if: ${{ github.event_name != 'push' || !contains(github.ref_name, '-') }}
    uses: ./.github/workflows/build-release-artifacts.yml
    with:
      artifact_name: squid4win-release
      release_channel: release
      prerelease: false
      publish_github_release: ${{ github.event_name == 'push' }}
