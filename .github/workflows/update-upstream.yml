name: Update Upstream Squid

on:
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:
    inputs:
      major_version:
        description: Optional Squid major train to follow
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  update-upstream:
    name: Refresh upstream release metadata
    runs-on: ubuntu-latest
    env:
      REQUESTED_MAJOR_VERSION: ${{ github.event.inputs.major_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Cache Python virtual environment
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: .venv
          key: ${{ runner.os }}-${{ runner.arch }}-py314-venv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-py314-venv-

      - name: Sync automation environment
        run: uv sync --locked

      - name: Update Squid version metadata
        id: update
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $arguments = @(
            'run',
            'squid4win-automation',
            'upstream-version',
            '--repository-root',
            $PWD.Path,
            '--execute'
          )
          if ($env:REQUESTED_MAJOR_VERSION) {
            $arguments += @('--major-version', $env:REQUESTED_MAJOR_VERSION)
          }
          & uv @arguments

      - name: Create pull request
        if: ${{ steps.update.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          branch: automation/update-squid-release
          delete-branch: true
          title: "chore: update Squid to ${{ steps.update.outputs.version }}"
          commit-message: "chore: update Squid to ${{ steps.update.outputs.version }}"
          add-paths: |
            conan/squid-release.json
            config/squid-version.json
            conandata.yml
          body: |
            ## Summary
            - update `config\squid-version.json` to Squid `${{ steps.update.outputs.version }}`
            - refresh generated `conan\squid-release.json` metadata for the same release
            - rewrite the versioned `sources` and `patches` entries in `conandata.yml` while preserving the existing Conan build metadata
            - use this scheduled workflow because Dependabot does not manage Conan package graphs or raw upstream Squid release pins

            ## Validation
            - refreshed release metadata with `uv run squid4win-automation upstream-version --execute`
          labels: |
            dependencies
            upstream-squid
