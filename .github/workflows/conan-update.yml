name: Update Conan lockfile

on:
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: windows-2022
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Resolve build automation configuration
        id: build-config
        run: |
          $layout = .\scripts\Resolve-SquidBuildLayout.ps1 -Configuration Release -RepositoryRoot $PWD.Path
          $conanHome = .\scripts\Resolve-ConanHome.ps1 -RepositoryRoot $PWD.Path

          "CONAN_HOME=$conanHome" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "conan_home=$conanHome" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "repo_lockfile_path=$($layout.RepoLockfilePath)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Cache Conan home
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ steps.build-config.outputs.conan_home }}
          key: ${{ runner.os }}-conan-${{ hashFiles('conanfile.py', 'conandata.yml', 'conan/**', 'requirements-automation.txt') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Install automation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .\requirements-automation.txt

      - name: Refresh Conan lockfile
        run: |
          .\scripts\Update-ConanLockfile.ps1 `
            -RepositoryRoot $PWD.Path `
            -Configuration Release `
            -LockfilePath '${{ steps.build-config.outputs.repo_lockfile_path }}' `
            -WithTray `
            -WithRuntimeDlls `
            -WithPackagingSupport

      - name: Open or update pull request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          branch: automation/update-conan-lockfile
          delete-branch: true
          commit-message: "chore: refresh Conan lockfile"
          title: "chore: refresh Conan lockfile"
          add-paths: |
            conan/lockfiles/**
          body: |
            Automated refresh of Conan dependency lockfiles.

            This workflow exists because official Dependabot updates do not support
            Conan 2 directly.
          labels: |
            automation
            dependencies
            conan
