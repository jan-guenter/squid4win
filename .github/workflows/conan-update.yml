name: Update Conan lockfile

on:
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: windows-2022
    env:
      CONAN_HOME: ${{ github.workspace }}\.conan2
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Cache Python virtual environment
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: .venv
          key: ${{ runner.os }}-${{ runner.arch }}-py314-venv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-py314-venv-

      - name: Sync automation environment
        run: uv sync --locked

      - name: Cache Conan home
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ runner.os }}-conan-${{ hashFiles('conan/**', 'pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-conan-

       - name: Refresh Conan lockfile
         run: |
           uv run squid4win-automation conan-lockfile-update `
             --repository-root $PWD.Path `
             --configuration Release `
             --lockfile-path 'conan\lockfiles\msys2-mingw-x64-release.lock' `
             --with-tray `
             --with-runtime-dlls `
             --with-packaging-support

      - name: Open or update pull request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          branch: automation/update-conan-lockfile
          delete-branch: true
          commit-message: "chore: refresh Conan lockfile"
          title: "chore: refresh Conan lockfile"
          add-paths: |
            conan/lockfiles/**
          body: |
            Automated refresh of Conan dependency lockfiles.

            This workflow exists because official Dependabot updates do not support
            Conan 2 directly.
          labels: |
            automation
            dependencies
            conan
