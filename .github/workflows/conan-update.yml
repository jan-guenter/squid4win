name: Update Conan lockfile

on:
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: windows-2022
    env:
      CONAN_HOME: ${{ github.workspace }}\.conan2
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Cache Python virtual environment
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .venv
          key: ${{ runner.os }}-${{ runner.arch }}-py314-venv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-py314-venv-

      - name: Sync automation environment
        run: uv sync --locked

      - name: Cache Conan home
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ runner.os }}-conan-${{ hashFiles('conan/**', 'pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Refresh Conan lockfile
        run: |
          uv run squid4win-automation conan-lockfile-update `
            --repository-root $PWD.Path `
            --configuration Release `
            --lockfile-path 'conan\lockfiles\msys2-mingw-x64-release.lock' `
            --with-tray `
            --with-runtime-dlls `
            --with-packaging-support

      - name: Open or update pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          branch: automation/update-conan-lockfile
          delete-branch: true
          commit-message: "chore: refresh Conan lockfile"
          title: "chore: refresh Conan lockfile"
          add-paths: |
            conan/lockfiles/**
          body: |
            Automated refresh of Conan dependency lockfiles.

            This workflow exists because official Dependabot updates do not support
            Conan 2 directly.
          labels: |
            automation
            dependencies
            conan
