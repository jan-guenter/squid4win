name: CI

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.editorconfig'
      - '.markdownlint-cli2.jsonc'
      - '.markdownlint.json'
      - '.markdownlintignore'
      - '.mega-linter.yml'
      - '.yamllint.yml'
      - 'Directory.Build.props'
      - 'scripts/PSScriptAnalyzerSettings.psd1'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'sonar-project.properties'
      - 'config/**'
      - 'src/squid4win/**'
      - 'src/tray/**'
      - 'conan/**'
      - 'packaging/**'
      - 'scripts/**'
      - 'skills/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.editorconfig'
      - '.markdownlint-cli2.jsonc'
      - '.markdownlint.json'
      - '.markdownlintignore'
      - '.mega-linter.yml'
      - '.yamllint.yml'
      - 'Directory.Build.props'
      - 'scripts/PSScriptAnalyzerSettings.psd1'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'sonar-project.properties'
      - 'config/**'
      - 'src/squid4win/**'
      - 'src/tray/**'
      - 'conan/**'
      - 'packaging/**'
      - 'scripts/**'
      - 'skills/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  SONAR_HOST_URL: https://sonarcloud.io

jobs:
  lint:
    name: Lint automation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      megalinter_outcome: ${{ steps.megalinter.outcome }}
      ty_outcome: ${{ steps.ty.outcome }}
      skill_frontmatter_outcome: ${{ steps.skill_frontmatter.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Run MegaLinter
        id: megalinter
        continue-on-error: true
        uses: oxsecurity/megalinter@8fbdead70d1409964ab3d5afa885e18ee85388bb # v9.4.0
        env:
          ENABLE_GITHUB_COMMENT: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Upload MegaLinter reports
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: megalinter-reports
          include-hidden-files: true
          path: |
            megalinter-reports
            mega-linter.log

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Cache Python virtual environment
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .venv
          key: ${{ runner.os }}-${{ runner.arch }}-py314-venv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-py314-venv-

      - name: Sync automation environment
        run: uv sync --locked

      - name: Run ty
        id: ty
        continue-on-error: true
        run: uv run ty check src

      - name: Run skill frontmatter lint
        id: skill_frontmatter
        continue-on-error: true
        run: uv run squid4win-automation skill-frontmatter-lint

      - name: Summarize lint results
        if: ${{ always() }}
        shell: bash
        run: |
          if [[ -z "${GITHUB_STEP_SUMMARY:-}" ]]; then
            exit 0
          fi

          format_result() {
            case "$1" in
              success) printf "✅ \`success\`" ;;
              failure) printf "❌ \`failure\`" ;;
              cancelled) printf "🚫 \`cancelled\`" ;;
              skipped) printf "⏭️ \`skipped\`" ;;
              *) printf "❔ \`%s\`" "$1" ;;
            esac
          }

          {
            echo "## Lint automation summary"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| MegaLinter | $(format_result \"${{ steps.megalinter.outcome }}\") |"
            echo "| ty | $(format_result \"${{ steps.ty.outcome }}\") |"
            echo "| skill-frontmatter-lint | $(format_result \"${{ steps.skill_frontmatter.outcome }}\") |"
            echo
            echo "- Artifact: \`megalinter-reports\`"
            echo "- MegaLinter PR decoration is explicitly enabled for GitHub pull requests."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on lint findings
        if: ${{ steps.megalinter.outcome != 'success' || steps.ty.outcome != 'success' || steps.skill_frontmatter.outcome != 'success' }}
        shell: bash
        run: |
          if [[ "${{ steps.megalinter.outcome }}" != "success" ]]; then
            echo "::error::MegaLinter reported blocking findings. See the megalinter-reports artifact for details."
          fi
          if [[ "${{ steps.ty.outcome }}" != "success" ]]; then
            echo "::error::ty reported blocking findings."
          fi
          if [[ "${{ steps.skill_frontmatter.outcome }}" != "success" ]]; then
            echo "::error::Skill frontmatter lint reported blocking findings."
          fi
          exit 1

  build-tray:
    name: Build tray app
    runs-on: windows-latest
    needs: lint
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Cache Python virtual environment
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .venv
          key: ${{ runner.os }}-${{ runner.arch }}-py314-venv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-py314-venv-

      - name: Sync automation environment
        run: uv sync --locked

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: 10.0.x

      - name: Build tray package
        id: build_tray
        run: |
          uv run squid4win-automation tray-build `
            --repository-root $PWD.Path `
            --configuration Release

      - name: Upload tray build artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: squid-tray-build
          path: build\tray\release\**
          if-no-files-found: warn

      - name: Summarize tray build
        if: ${{ always() }}
        run: |
          if (-not $env:GITHUB_STEP_SUMMARY) {
            exit 0
          }
          function Format-Result([string]$Outcome) {
            switch ($Outcome) {
              'success' { '✅ `success`'; break }
              'failure' { '❌ `failure`'; break }
              'cancelled' { '🚫 `cancelled`'; break }
              'skipped' { '⏭️ `skipped`'; break }
              default {
                $display = if ([string]::IsNullOrWhiteSpace($Outcome)) { 'unknown' } else { $Outcome }
                "❔ $display"
              }
            }
          }
          $summaryLines = @(
            '## Tray build summary',
            '',
            '| Check | Result |',
            '| --- | --- |',
            ('| Build tray package | {0} |' -f (Format-Result '${{ steps.build_tray.outcome }}')),
            '',
            '- Artifact: `squid-tray-build`'
          )
          $summaryLines -join [Environment]::NewLine | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

  validate-linux-recipe:
    name: Validate Linux recipe (${{ matrix.compiler_label }}, ${{ matrix.library_configuration_label }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler_label: gcc-13
            profile_name: linux-gcc-x64
            build_type: Release
            library_configuration_label: system-libraries
            openssl_source: system
            libxml2_source: system
            pcre2_source: system
            zlib_source: system
            openssl_linkage: default
          - compiler_label: gcc-13
            profile_name: linux-gcc-x64
            build_type: Release
            library_configuration_label: conan-mixed
            openssl_source: conan
            libxml2_source: conan
            pcre2_source: conan
            zlib_source: conan
            openssl_linkage: shared
          - compiler_label: gcc-13
            profile_name: linux-gcc-x64
            build_type: Release
            library_configuration_label: conan-static
            openssl_source: conan
            libxml2_source: conan
            pcre2_source: conan
            zlib_source: conan
            openssl_linkage: static
          - compiler_label: clang-18
            profile_name: linux-clang-x64
            build_type: Release
            library_configuration_label: system-libraries
            openssl_source: system
            libxml2_source: system
            pcre2_source: system
            zlib_source: system
            openssl_linkage: default
          - compiler_label: clang-18
            profile_name: linux-clang-x64
            build_type: Release
            library_configuration_label: conan-mixed
            openssl_source: conan
            libxml2_source: conan
            pcre2_source: conan
            zlib_source: conan
            openssl_linkage: shared
          - compiler_label: clang-18
            profile_name: linux-clang-x64
            build_type: Release
            library_configuration_label: conan-static
            openssl_source: conan
            libxml2_source: conan
            pcre2_source: conan
            zlib_source: conan
            openssl_linkage: static
    uses: ./.github/workflows/conan-validate-recipe.yml
    with:
      profile_name: ${{ matrix.profile_name }}
      compiler_label: ${{ matrix.compiler_label }}
      build_type: ${{ matrix.build_type }}
      library_configuration_label: ${{ matrix.library_configuration_label }}
      openssl_source: ${{ matrix.openssl_source }}
      libxml2_source: ${{ matrix.libxml2_source }}
      pcre2_source: ${{ matrix.pcre2_source }}
      zlib_source: ${{ matrix.zlib_source }}
      openssl_linkage: ${{ matrix.openssl_linkage }}

  validate-windows-recipe:
    name: Validate Windows recipe (${{ matrix.library_configuration_label }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - library_configuration_label: system-libraries
            openssl_source: system
            libxml2_source: system
            pcre2_source: system
            zlib_source: system
            openssl_linkage: default
          - library_configuration_label: conan-mixed
            openssl_source: conan
            libxml2_source: conan
            pcre2_source: conan
            zlib_source: conan
            openssl_linkage: shared
          - library_configuration_label: conan-static
            openssl_source: conan
            libxml2_source: conan
            pcre2_source: conan
            zlib_source: conan
            openssl_linkage: static
    uses: ./.github/workflows/conan-validate-recipe-windows.yml
    with:
      profile_name: msys2-mingw-x64
      build_type: Release
      library_configuration_label: ${{ matrix.library_configuration_label }}
      openssl_source: ${{ matrix.openssl_source }}
      libxml2_source: ${{ matrix.libxml2_source }}
      pcre2_source: ${{ matrix.pcre2_source }}
      zlib_source: ${{ matrix.zlib_source }}
      openssl_linkage: ${{ matrix.openssl_linkage }}

  build-msys2:
    name: Build MSYS2/MinGW-w64
    runs-on: windows-latest
    needs:
      - lint
      - validate-windows-recipe
    env:
      CONAN_HOME: ${{ github.workspace }}\.conan2
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Cache Python virtual environment
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .venv
          key: ${{ runner.os }}-${{ runner.arch }}-py314-venv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-py314-venv-

      - name: Sync automation environment
        run: uv sync --locked

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Conan home
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ runner.os }}-conan-${{ hashFiles('conan/**', 'pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Build native Squid bundle
        id: build_bundle
        run: |
          uv run squid4win-automation squid-build `
            --repository-root $PWD.Path `
            --configuration Release `
            --lockfile-path 'conan\lockfiles\msys2-mingw-x64-release.lock' `
            --refresh-lockfile `
            --with-tray `
            --with-runtime-dlls `
            --with-packaging-support

      - name: Smoke test Squid
        id: smoke_test
        run: uv run squid4win-automation smoke-test --configuration Release --require-notices

      - name: Summarize SonarCloud scanner mode
        if: ${{ vars.SONAR_CI_SCAN_ENABLED != 'true' }}
        run: |
          if (-not $env:GITHUB_STEP_SUMMARY) {
            exit 0
          }

          $summaryLines = @(
            '## SonarQube',
            '',
            '- CI-based scanning is currently skipped because `SONAR_CI_SCAN_ENABLED` is not set to `true`.',
            '- Disable SonarCloud Automatic Analysis for this project before re-enabling workflow-based scanner runs.'
          )

          $summaryLines -join [Environment]::NewLine | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

      - name: Run SonarQube scan for pull requests
        id: sonar_scan_pr
        if: ${{ vars.SONAR_CI_SCAN_ENABLED == 'true' && github.event_name == 'pull_request' }}
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONARQUBE_ORG || github.repository_owner }}
            -Dsonar.projectVersion=${{ github.sha }}
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.head_ref }}
            -Dsonar.pullrequest.base=${{ github.base_ref }}
            -Dsonar.python.version=3.14

      - name: Run SonarQube scan for branches
        id: sonar_scan_branch
        if: ${{ vars.SONAR_CI_SCAN_ENABLED == 'true' && github.event_name != 'pull_request' }}
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONARQUBE_ORG || github.repository_owner }}
            -Dsonar.projectVersion=${{ github.sha }}
            -Dsonar.branch.name=${{ github.ref_name }}
            -Dsonar.python.version=3.14

      - name: Check SonarQube quality gate
        id: sonar_quality_gate
        if: ${{ vars.SONAR_CI_SCAN_ENABLED == 'true' && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') }}
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: Upload build binaries and symbols
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: squid-msys2-build
          path: |
            build\tray\release\**
            build\install\release\**
            build\conan\msys2-mingw-x64-release\build\**\config.log
          if-no-files-found: warn

      - name: Summarize native build validation
        if: ${{ always() }}
        run: |
          if (-not $env:GITHUB_STEP_SUMMARY) {
            exit 0
          }
          function Format-Result([string]$Outcome) {
            switch ($Outcome) {
              'success' { '✅ `success`'; break }
              'failure' { '❌ `failure`'; break }
              'cancelled' { '🚫 `cancelled`'; break }
              'skipped' { '⏭️ `skipped`'; break }
              default {
                $display = if ([string]::IsNullOrWhiteSpace($Outcome)) { 'unknown' } else { $Outcome }
                "❔ $display"
              }
            }
          }
          $summaryLines = @(
            '## Native build validation summary',
            '',
            '| Check | Result |',
            '| --- | --- |',
            ('| Build native Squid bundle | {0} |' -f (Format-Result '${{ steps.build_bundle.outcome }}')),
            ('| Smoke test Squid | {0} |' -f (Format-Result '${{ steps.smoke_test.outcome }}')),
            ('| SonarQube scan (pull request) | {0} |' -f (Format-Result '${{ steps.sonar_scan_pr.outcome }}')),
            ('| SonarQube scan (branch) | {0} |' -f (Format-Result '${{ steps.sonar_scan_branch.outcome }}')),
            ('| SonarQube quality gate | {0} |' -f (Format-Result '${{ steps.sonar_quality_gate.outcome }}')),
            '',
            '- Artifact: `squid-msys2-build`'
          )
          $summaryLines -join [Environment]::NewLine | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

  report-ci:
    name: Report CI results
    if: ${{ always() }}
    needs:
      - lint
      - build-tray
      - validate-linux-recipe
      - validate-windows-recipe
      - build-msys2
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Build CI report
        id: report
        shell: bash
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          BUILD_TRAY_RESULT: ${{ needs.build-tray.result }}
          VALIDATE_LINUX_RESULT: ${{ needs.validate-linux-recipe.result }}
          VALIDATE_WINDOWS_RESULT: ${{ needs.validate-windows-recipe.result }}
          BUILD_MSYS2_RESULT: ${{ needs.build-msys2.result }}
          MEGALINTER_OUTCOME: ${{ needs.lint.outputs.megalinter_outcome }}
          TY_OUTCOME: ${{ needs.lint.outputs.ty_outcome }}
          SKILL_FRONTMATTER_OUTCOME: ${{ needs.lint.outputs.skill_frontmatter_outcome }}
        run: |
          mkdir -p reports

          format_result() {
            case "$1" in
              success) printf "✅ \`success\`" ;;
              failure) printf "❌ \`failure\`" ;;
              cancelled) printf "🚫 \`cancelled\`" ;;
              skipped) printf "⏭️ \`skipped\`" ;;
              *) printf "❔ \`%s\`" "${1:-unknown}" ;;
            esac
          }

          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          report_path="reports/ci-report.md"
          cat > "$report_path" <<EOF
          <!-- squid4win:ci-report -->
          ## CI validation report

          | Job | Result | Details |
          | --- | --- | --- |
          | Lint automation | $(format_result "$LINT_RESULT") | MegaLinter=$(format_result "$MEGALINTER_OUTCOME"), ty=$(format_result "$TY_OUTCOME"), skill-frontmatter-lint=$(format_result "$SKILL_FRONTMATTER_OUTCOME"); artifact \`megalinter-reports\` |
          | Build tray app | $(format_result "$BUILD_TRAY_RESULT") | Artifact \`squid-tray-build\` |
          | Validate Linux recipe | $(format_result "$VALIDATE_LINUX_RESULT") | Artifacts \`conan-validation-linux-*\` |
          | Validate Windows recipe | $(format_result "$VALIDATE_WINDOWS_RESULT") | Artifacts \`conan-validation-windows-*\` |
          | Build MSYS2/MinGW-w64 | $(format_result "$BUILD_MSYS2_RESULT") | Artifact \`squid-msys2-build\` |

          - Workflow run: [${{ github.workflow }} #${{ github.run_number }}]($run_url)
          - MegaLinter PR decoration is explicitly enabled on pull requests.
          - This report job is the GitHub check for the aggregated CI summary.
          EOF

          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            cat "$report_path" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "report_path=$report_path" >> "$GITHUB_OUTPUT"

      - name: Upsert CI PR comment
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REPORT_PATH: ${{ steps.report.outputs.report_path }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- squid4win:ci-report -->';
            const body = fs.readFileSync(process.env.REPORT_PATH, 'utf8');
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
