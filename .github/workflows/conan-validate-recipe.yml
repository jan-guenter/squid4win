name: Validate Conan recipe

on:
  workflow_call:
    inputs:
      profile_name:
        description: Linux Conan host profile under conan/profiles.
        required: true
        type: string
      compiler_label:
        description: Human-readable compiler label for cache partitioning.
        required: true
        type: string
      build_type:
        description: Conan build_type to validate.
        required: false
        default: Release
        type: string
      library_configuration_label:
        description: Human-readable label for the dependency/source matrix entry.
        required: true
        type: string
      openssl_source:
        description: Source selection for OpenSSL.
        required: true
        type: string
      libxml2_source:
        description: Source selection for libxml2.
        required: true
        type: string
      pcre2_source:
        description: Source selection for PCRE2.
        required: true
        type: string
      zlib_source:
        description: Source selection for zlib.
        required: true
        type: string
      openssl_linkage:
        description: Linkage override for the Conan OpenSSL package.
        required: false
        default: default
        type: string

permissions:
  contents: read

env:
  CONAN_HOME: ${{ github.workspace }}/.conan2

jobs:
  validate:
    name: ${{ inputs.compiler_label }} / ${{ inputs.library_configuration_label }} / ${{ inputs.build_type }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Cache Python virtual environment
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .venv
          key: ${{ runner.os }}-${{ runner.arch }}-py314-venv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-py314-venv-

      - name: Sync automation environment
        run: uv sync --locked

      - name: Cache Conan home
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ runner.os }}-${{ inputs.compiler_label }}-${{ inputs.library_configuration_label }}-conan-${{ hashFiles('conan/recipes/squid/**', 'conan/profiles/**', 'pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ inputs.compiler_label }}-${{ inputs.library_configuration_label }}-conan-
            ${{ runner.os }}-${{ inputs.compiler_label }}-conan-
            ${{ runner.os }}-conan-

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          common_packages=(
            autoconf
            automake
            bison
            flex
            libpcre2-dev
            libssl-dev
            libtool
            libxml2-dev
            m4
            make
            perl
            pkg-config
            zlib1g-dev
          )

          compiler_label="${{ inputs.compiler_label }}"
          profile_name="${{ inputs.profile_name }}"
          toolchain_packages=()

          case "${compiler_label,,}:${profile_name,,}" in
            *clang*:*|*:*clang*)
              toolchain_packages=(
                clang-18
                llvm-18
              )
              ;;
            *gcc*:*|*g++*:*|*:*gcc*|*:*g++*)
              toolchain_packages=(
                gcc-13
                g++-13
              )
              ;;
            *)
              echo "Unsupported compiler selection: compiler_label='${compiler_label}', profile_name='${profile_name}'" >&2
              exit 1
              ;;
          esac

          sudo apt-get install --yes "${common_packages[@]}" "${toolchain_packages[@]}"

      - name: Validate Squid recipe with Python automation
        id: validate_recipe
        continue-on-error: true
        run: |
          uv run squid4win-automation conan-recipe-validate \
            --repository-root "$GITHUB_WORKSPACE" \
            --configuration "${{ inputs.build_type }}" \
            --host-profile-path "conan/profiles/${{ inputs.profile_name }}" \
            --build-profile default \
            --openssl-source "${{ inputs.openssl_source }}" \
            --libxml2-source "${{ inputs.libxml2_source }}" \
            --pcre2-source "${{ inputs.pcre2_source }}" \
            --zlib-source "${{ inputs.zlib_source }}" \
            --openssl-linkage "${{ inputs.openssl_linkage }}"

      - name: Stage Conan validation artifacts
        if: ${{ always() }}
        run: |
          uv run squid4win-automation conan-recipe-stage-artifacts \
            --repository-root "$GITHUB_WORKSPACE" \
            --configuration "${{ inputs.build_type }}" \
            --host-profile-path "conan/profiles/${{ inputs.profile_name }}" \
            --compiler-label "${{ inputs.compiler_label }}" \
            --library-configuration-label "${{ inputs.library_configuration_label }}" \
            --openssl-source "${{ inputs.openssl_source }}" \
            --libxml2-source "${{ inputs.libxml2_source }}" \
            --pcre2-source "${{ inputs.pcre2_source }}" \
            --zlib-source "${{ inputs.zlib_source }}" \
            --openssl-linkage "${{ inputs.openssl_linkage }}"

      - name: Upload Conan validation artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: conan-validation-linux-${{ inputs.compiler_label }}-${{ inputs.library_configuration_label }}-${{ inputs.build_type }}
          path: artifacts/conan-recipe-validation/**
          if-no-files-found: error

      - name: Summarize Conan recipe validation
        if: ${{ always() }}
        shell: bash
        run: |
          if [[ -z "${GITHUB_STEP_SUMMARY:-}" ]]; then
            exit 0
          fi

          format_result() {
            case "$1" in
              success) printf "✅ \`success\`" ;;
              failure) printf "❌ \`failure\`" ;;
              cancelled) printf "🚫 \`cancelled\`" ;;
              skipped) printf "⏭️ \`skipped\`" ;;
              *) printf "❔ \`%s\`" "${1:-unknown}" ;;
            esac
          }

          {
            echo "## Conan recipe validation summary"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Platform | Linux |"
            echo "| Compiler | \`${{ inputs.compiler_label }}\` |"
            echo "| Profile | \`${{ inputs.profile_name }}\` |"
            echo "| Build type | \`${{ inputs.build_type }}\` |"
            echo "| Library configuration | \`${{ inputs.library_configuration_label }}\` |"
            echo "| Validation step | $(format_result \"${{ steps.validate_recipe.outcome }}\") |"
            echo "| Artifact | \`conan-validation-linux-${{ inputs.compiler_label }}-${{ inputs.library_configuration_label }}-${{ inputs.build_type }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when validation failed
        if: ${{ steps.validate_recipe.outcome != 'success' }}
        run: |
          echo "Squid recipe validation failed. Review the uploaded Conan validation artifact." >&2
          exit 1
