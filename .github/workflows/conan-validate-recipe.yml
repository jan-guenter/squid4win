name: Validate Conan recipe

on:
  workflow_call:
    inputs:
      profile_name:
        description: Linux Conan host profile under conan/profiles.
        required: true
        type: string
      compiler_label:
        description: Human-readable compiler label for cache partitioning.
        required: true
        type: string
      build_type:
        description: Conan build_type to validate.
        required: false
        default: Release
        type: string

permissions:
  contents: read

env:
  CONAN_HOME: ${{ github.workspace }}/.conan2

jobs:
  validate:
    name: ${{ inputs.compiler_label }} / ${{ inputs.build_type }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Cache Python virtual environment
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: .venv
          key: ${{ runner.os }}-${{ runner.arch }}-py314-venv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-py314-venv-

      - name: Sync automation environment
        run: uv sync --locked

      - name: Cache Conan home
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ runner.os }}-${{ inputs.compiler_label }}-conan-${{ hashFiles('conan/recipes/squid/**', 'conan/profiles/**', 'pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ inputs.compiler_label }}-conan-
            ${{ runner.os }}-conan-

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            autoconf \
            automake \
            bison \
            clang-18 \
            flex \
            gcc-13 \
            g++-13 \
            libpcre2-dev \
            libssl-dev \
            libtool \
            libxml2-dev \
            llvm-18 \
            m4 \
            make \
            perl \
            pkg-config \
            zlib1g-dev

      - name: Detect default Conan build profile
        run: uv run conan profile detect --force

      - name: Validate Squid recipe with conan create
        run: |
          uv run conan create conan/recipes/squid/all \
            --profile:host "conan/profiles/${{ inputs.profile_name }}" \
            --profile:build default \
            -s:h "build_type=${{ inputs.build_type }}" \
            -s:b "build_type=${{ inputs.build_type }}" \
            --build=missing
