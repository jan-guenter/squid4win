name: Service runner validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/service-runner-validation.yml'
      - '.github/workflows/conan-validate-recipe-windows.yml'
      - 'Directory.Build.props'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'config/**'
      - 'src/squid4win/**'
      - 'src/tray/**'
      - 'conan/**'
      - 'packaging/**'
      - 'scripts/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/service-runner-validation.yml'
      - '.github/workflows/conan-validate-recipe-windows.yml'
      - 'Directory.Build.props'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'config/**'
      - 'src/squid4win/**'
      - 'src/tray/**'
      - 'conan/**'
      - 'packaging/**'
      - 'scripts/**'

permissions:
  contents: read

concurrency:
  group: service-runner-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true

jobs:
  validate-windows-recipe:
    name: Validate Windows recipe (${{ matrix.library_configuration_label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - library_configuration_label: system-libraries
            openssl_source: system
            libxml2_source: system
            pcre2_source: system
            zlib_source: system
            openssl_linkage: default
          - library_configuration_label: conan-mixed
            openssl_source: conan
            libxml2_source: conan
            pcre2_source: conan
            zlib_source: conan
            openssl_linkage: shared
          - library_configuration_label: conan-static
            openssl_source: conan
            libxml2_source: conan
            pcre2_source: conan
            zlib_source: conan
            openssl_linkage: static
    uses: ./.github/workflows/conan-validate-recipe-windows.yml
    with:
      profile_name: msys2-mingw-x64
      build_type: Release
      library_configuration_label: ${{ matrix.library_configuration_label }}
      openssl_source: ${{ matrix.openssl_source }}
      libxml2_source: ${{ matrix.libxml2_source }}
      pcre2_source: ${{ matrix.pcre2_source }}
      zlib_source: ${{ matrix.zlib_source }}
      openssl_linkage: ${{ matrix.openssl_linkage }}

  validate-installed-service:
    name: Validate installed service
    needs: validate-windows-recipe
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      CONAN_HOME: ${{ github.workspace }}\.conan2
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Cache Python virtual environment
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .venv
          key: ${{ runner.os }}-${{ runner.arch }}-py314-venv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-py314-venv-

      - name: Sync automation environment
        run: uv sync --locked

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Conan home
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ runner.os }}-conan-${{ hashFiles('conan/**', 'pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Build native Squid bundle
        id: build_bundle
        run: |
           uv run squid4win-automation squid-build `
             --repository-root $PWD.Path `
             --configuration Release `
             --lockfile-path 'conan\lockfiles\msys2-mingw-x64-release.lock' `
             --refresh-lockfile `
             --with-tray `
             --with-runtime-dlls `
             --with-packaging-support

      - name: Smoke test Squid
        id: smoke_test
        run: uv run squid4win-automation smoke-test --configuration Release --require-notices

      - name: Validate installed service lifecycle
        id: service_validation
        run: uv run squid4win-automation service-runner-validation --configuration Release

      - name: Upload runner build and validation artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: service-runner-validation
          path: |
            build\tray\release\**
            build\install\release\**
            build\conan\msys2-mingw-x64-release\build\**\config.log
            artifacts\service-validation\**
          if-no-files-found: warn

      - name: Summarize installed service validation
        if: ${{ always() }}
        run: |
          if (-not $env:GITHUB_STEP_SUMMARY) {
            exit 0
          }
          function Format-Result([string]$Outcome) {
            switch ($Outcome) {
              'success' { '✅ `success`'; break }
              'failure' { '❌ `failure`'; break }
              'cancelled' { '🚫 `cancelled`'; break }
              'skipped' { '⏭️ `skipped`'; break }
              default {
                $display = if ([string]::IsNullOrWhiteSpace($Outcome)) { 'unknown' } else { $Outcome }
                "❔ $display"
              }
            }
          }
          $summaryLines = @(
            '## Installed service validation summary',
            '',
            '| Check | Result |',
            '| --- | --- |',
            ('| Build native Squid bundle | {0} |' -f (Format-Result '${{ steps.build_bundle.outcome }}')),
            ('| Smoke test Squid | {0} |' -f (Format-Result '${{ steps.smoke_test.outcome }}')),
            ('| Validate installed service lifecycle | {0} |' -f (Format-Result '${{ steps.service_validation.outcome }}')),
            '',
            '- Artifact: `service-runner-validation`'
          )
          $summaryLines -join [Environment]::NewLine | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8

  report-validation:
    name: Report service validation results
    if: ${{ always() }}
    needs:
      - validate-windows-recipe
      - validate-installed-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Build service validation report
        id: report
        shell: bash
        env:
          VALIDATE_WINDOWS_RESULT: ${{ needs.validate-windows-recipe.result }}
          VALIDATE_SERVICE_RESULT: ${{ needs.validate-installed-service.result }}
        run: |
          mkdir -p reports

          format_result() {
            case "$1" in
              success) printf "✅ \`success\`" ;;
              failure) printf "❌ \`failure\`" ;;
              cancelled) printf "🚫 \`cancelled\`" ;;
              skipped) printf "⏭️ \`skipped\`" ;;
              *) printf "❔ \`%s\`" "${1:-unknown}" ;;
            esac
          }

          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          report_path="reports/service-runner-validation-report.md"
          cat > "$report_path" <<EOF
          <!-- squid4win:service-runner-validation-report -->
          ## Service runner validation report

          | Job | Result | Details |
          | --- | --- | --- |
          | Validate Windows recipe | $(format_result "$VALIDATE_WINDOWS_RESULT") | Artifacts \`conan-validation-windows-*\` |
          | Validate installed service | $(format_result "$VALIDATE_SERVICE_RESULT") | Artifact \`service-runner-validation\` |

          - Workflow run: [${{ github.workflow }} #${{ github.run_number }}]($run_url)
          - This report job is the GitHub check for the aggregated service validation summary.
          EOF

          if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
            cat "$report_path" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "report_path=$report_path" >> "$GITHUB_OUTPUT"

      - name: Upsert service validation PR comment
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          REPORT_PATH: ${{ steps.report.outputs.report_path }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- squid4win:service-runner-validation-report -->';
            const body = fs.readFileSync(process.env.REPORT_PATH, 'utf8');
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
