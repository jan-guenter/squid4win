name: Service runner validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/service-runner-validation.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'src/squid4win/**'
      - 'conan/**'
      - 'conandata.yml'
      - 'conanfile.py'
      - 'packaging/**'
      - 'scripts/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/service-runner-validation.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'src/squid4win/**'
      - 'conan/**'
      - 'conandata.yml'
      - 'conanfile.py'
      - 'packaging/**'
      - 'scripts/**'

permissions:
  contents: read

concurrency:
  group: service-runner-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true

jobs:
  validate-installed-service:
    name: Validate installed service
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      CONAN_HOME: ${{ github.workspace }}\.conan2
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true

      - name: Cache Python virtual environment
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: .venv
          key: ${{ runner.os }}-${{ runner.arch }}-py314-venv-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-py314-venv-

      - name: Sync automation environment
        run: uv sync --locked

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: 10.0.x

      - name: Cache Conan home
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ runner.os }}-conan-${{ hashFiles('conanfile.py', 'conandata.yml', 'conan/**', 'pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Build native Squid bundle
        run: |
          uv run squid4win-automation squid-build `
            --repository-root $PWD.Path `
            --configuration Release `
            --lockfile-path 'conan\lockfiles\msys2-mingw-x64-release.lock' `
            --refresh-lockfile `
            --with-tray `
            --with-runtime-dlls `
            --with-packaging-support `
            --execute

      - name: Smoke test Squid
        run: uv run squid4win-automation smoke-test --execute --configuration Release --require-notices

      - name: Validate installed service lifecycle
        run: uv run squid4win-automation service-runner-validation --execute --configuration Release

      - name: Upload runner validation artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: service-runner-validation
          path: artifacts\service-validation\**
          if-no-files-found: ignore
